name: Selenium Boot CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

# dorny/test-reporter needs checks:write to create Check Runs
permissions:
  checks: write
  contents: read

jobs:
  test:
    name: Run Selenium Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run tests
        run: mvn test --no-transfer-progress
        continue-on-error: true
        env:
          # Selenium Boot detects CI=true and auto-enables headless mode
          CI: true

      - name: Show surefire reports (debug)
        if: always()
        run: |
          echo "=== target/surefire-reports ==="
          ls -la target/surefire-reports/ 2>/dev/null || echo "(directory does not exist)"
          echo "=== target/ ==="
          ls -la target/ 2>/dev/null || echo "(target/ does not exist)"

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-boot-report
          path: target/selenium-boot-report.html
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload JUnit XML results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-xml
          path: target/surefire-reports/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload metrics JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: execution-metrics
          path: |
            target/selenium-boot-metrics.json
            target/metrics-history/
          if-no-files-found: ignore
          retention-days: 30

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Selenium Boot Test Results
          path: '**/surefire-reports/TEST-*.xml'
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false
