name: Selenium Boot CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  checks: write
  contents: read

jobs:

  # ── Job 1: Framework unit tests ──────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout framework
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        run: mvn test --no-transfer-progress

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: target/surefire-reports/
          if-no-files-found: ignore
          retention-days: 14

      - name: Publish unit test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Unit Test Results
          path: '**/surefire-reports/TEST-*.xml'
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

  # ── Job 2: Consumer integration tests ────────────────────────────────────────
  integration-tests:
    name: Consumer Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout framework
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install framework to local Maven repo
        run: mvn install -DskipTests -Dgpg.skip=true --no-transfer-progress

      - name: Get framework version
        id: version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "value=$VERSION" >> $GITHUB_OUTPUT

      - name: Checkout consumer test project
        uses: actions/checkout@v4
        with:
          repository: seleniumboot/selenium-boot-test
          path: selenium-boot-test

      - name: Pin consumer project to current framework version
        run: |
          sed -i "s|<artifactId>selenium-boot</artifactId>.*|<artifactId>selenium-boot</artifactId>|" selenium-boot-test/pom.xml
          sed -i "/<artifactId>selenium-boot<\/artifactId>/{n;s|<version>.*</version>|<version>${{ steps.version.outputs.value }}</version>|}" selenium-boot-test/pom.xml

      - name: Run API integration tests (no browser)
        run: |
          cd selenium-boot-test
          mvn test -Dtest="ApiDemoTest,ApiSchemaDemoTest" --no-transfer-progress
        env:
          CI: true

      - name: Upload consumer test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: consumer-test-results
          path: selenium-boot-test/target/surefire-reports/
          if-no-files-found: ignore
          retention-days: 14

      - name: Publish consumer test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Consumer Integration Test Results
          path: 'selenium-boot-test/**/surefire-reports/TEST-*.xml'
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false
